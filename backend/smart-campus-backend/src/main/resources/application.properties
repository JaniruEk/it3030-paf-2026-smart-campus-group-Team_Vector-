spring.application.name=smart-campus-backend

# Server
server.port=8080
server.error.include-message=always

# Firebase (no DB URL needed anymore)
firebase.project-id=smart-campus-operations-hub   # ← change if your project ID is different

# CORS (for React frontend)
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Large JSON/Image support
server.tomcat.max-http-post-size=50MB
server.tomcat.max-swallow-size=-1
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
spring.jackson.serialization.fail-on-empty-beans=false
